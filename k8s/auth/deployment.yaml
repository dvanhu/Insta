apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
      - name: auth-service
        image: insta-auth-service:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 3001

        # 🔥 REQUIRED FOR CPU-BASED AUTOSCALING
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "500m"

        # ❤️ LIVENESS PROBE
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10

        # ✅ READINESS PROBE
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
