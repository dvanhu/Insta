apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service

spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:   # ✅ THIS WAS MISSING
      containers:
        - name: user-service
          image: insta-user-service:latest   # ✅ FIXED IMAGE NAME
          imagePullPolicy: Never
          ports:
            - containerPort: 3004

          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "500m"
