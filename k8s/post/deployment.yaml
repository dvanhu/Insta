apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-service

spec:
  replicas: 2
  selector:
    matchLabels:
      app: post-service

  template:
    metadata:
      labels:
        app: post-service

    spec:
      containers:
        - name: post-service
          image: insta-post-service:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 3003

          env:
            - name: PORT
              value: "3003"

          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "500m"
