apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service

spec:
  replicas: 2
  selector:
    matchLabels:
      app: media-service

  template:
    metadata:
      labels:
        app: media-service

    spec:
      containers:
        - name: media-service
          image: insta-media-service:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 3002   # ⚠️ MATCH YOUR APP

          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "500m"
