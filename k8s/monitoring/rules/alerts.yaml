apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: insta-alerts
  namespace: monitoring
  labels:
    release: monitoring   # 🔥 CRITICAL FIX
spec:
  groups:
  - name: insta.rules
    rules:

    - alert: HighTraffic
      expr: sum(rate(http_requests_total[1m])) > 200
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: "High traffic detected"

    - alert: HighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total[1m])) > 0.5
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage detected"

    - alert: PodCrashLooping
      expr: kube_pod_container_status_restarts_total > 5
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Pod restarting frequently"
